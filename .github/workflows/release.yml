name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v (for example 0.2.0)"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: clippy

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify repository
        run: pnpm check:repo

  build:
    name: Build ${{ matrix.bundle-label }} assets
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundle-label: macos-apple-silicon
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
          - os: macos-15-intel
            bundle-label: macos-intel
            args: "--target x86_64-apple-darwin"
            rust-target: x86_64-apple-darwin
          - os: ubuntu-22.04
            bundle-label: linux
            args: ""
            rust-target: ""
          - os: windows-latest
            bundle-label: windows
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Setup Rust
        if: matrix.rust-target == ''
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Setup Rust target
        if: matrix.rust-target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            VERSION_INPUT="${{ github.event.inputs.version }}"
            if [[ -z "${VERSION_INPUT}" ]]; then
              echo "workflow_dispatch requires a version input." >&2
              exit 1
            fi
            TAG_NAME="v${VERSION_INPUT}"
          fi

          VERSION="${TAG_NAME#v}"

          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_name=Banana ${TAG_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Validate release version matches project metadata
        shell: bash
        run: |
          EXPECTED_VERSION="${{ steps.release_meta.outputs.version }}"
          PROJECT_VERSION="$(node -p "require('./package.json').version")"
          export EXPECTED_VERSION PROJECT_VERSION

          node --input-type=module <<'NODE'
          import { assertReleaseVersionMatchesProjectVersion } from "./scripts/release-tools.mjs";

          assertReleaseVersionMatchesProjectVersion({
            expectedVersion: process.env.EXPECTED_VERSION,
            projectVersion: process.env.PROJECT_VERSION,
          });
          NODE

      - name: Validate updater signing secrets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          for required_secret in \
            "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" \
            "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" \
            "${{ secrets.BANANA_UPDATER_PUBLIC_KEY }}"; do
            if [[ -z "${required_secret}" ]]; then
              echo "Missing updater signing secret for macOS release." >&2
              exit 1
            fi
          done

      - name: Inject updater public key into Tauri config
        if: runner.os == 'macOS'
        env:
          BANANA_UPDATER_PUBLIC_KEY: ${{ secrets.BANANA_UPDATER_PUBLIC_KEY }}
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";

          const configPath = "src-tauri/tauri.conf.json";
          const publicKey = process.env.BANANA_UPDATER_PUBLIC_KEY?.trim();

          if (!publicKey) {
            throw new Error("Missing updater public key.");
          }

          const config = JSON.parse(readFileSync(configPath, "utf8"));
          config.plugins ??= {};
          config.plugins.updater ??= {};
          config.plugins.updater.pubkey = publicKey;

          writeFileSync(configPath, `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Build and upload release assets
        # Upstream no longer exposes a resolvable `v1` ref, so pin to the latest published action tag.
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          BANANA_UPDATER_PUBLIC_KEY: ${{ secrets.BANANA_UPDATER_PUBLIC_KEY }}
        with:
          tagName: ${{ steps.release_meta.outputs.tag_name }}
          releaseName: ${{ steps.release_meta.outputs.release_name }}
          releaseBody: |
            Stable GitHub release for Banana.

            Notes:
            - macOS assets include updater metadata for in-app updates.
            - Only published stable releases are detected by the app updater.
            - macOS artifacts are not notarized.
            - Windows artifacts are not code signed and do not use in-app installation yet.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

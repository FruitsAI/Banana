name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: clippy

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify repository
        run: pnpm check:repo

  build:
    name: Build ${{ matrix.bundle-label }} assets
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundle-label: macos-apple-silicon
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
          - os: macos-13
            bundle-label: macos-intel
            args: "--target x86_64-apple-darwin"
            rust-target: x86_64-apple-darwin
          - os: ubuntu-22.04
            bundle-label: linux
            args: ""
            rust-target: ""
          - os: windows-latest
            bundle-label: windows
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Setup Rust
        if: matrix.rust-target == ''
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Setup Rust target
        if: matrix.rust-target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Banana v__VERSION__
          releaseBody: |
            Unsigned GitHub build for Banana.

            Notes:
            - macOS artifacts are not notarized.
            - Windows artifacts are not code signed.
            - No auto-update channel is configured.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

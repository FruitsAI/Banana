name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
      - "release/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: clippy

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate changelog updates in pull requests
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          pnpm changelog:check -- --range origin/${{ github.base_ref }}...HEAD

      - name: Validate changelog updates in pushed commits
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: pnpm changelog:check -- --range ${{ github.event.before }}...${{ github.sha }}

      - name: Validate version metadata
        run: pnpm version:check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Check Rust workspace
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Lint Rust workspace
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
